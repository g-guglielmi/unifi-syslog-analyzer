name: Release image

# Push a tag like v0.0.1 to build and publish
# ghcr.io/g-guglielmi/unifi-syslog-analyzer:{v0.0.1, 0.0.1, latest}
# and create the matching GitHub release with a changelog generated from
# the commits since the previous tag.
#
# Backfill: releases for tags published before this workflow existed can
# be created from the Actions tab (Run workflow -> enter the tag). A
# backfill rebuilds and re-pushes that version's image tags but does NOT
# move :latest, and skips release creation if the release already exists.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v0.0.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: End-to-end test harness (release gate)
        run: python3 test_harness.py

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ env.TAG }}
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists - skipping"
            exit 0
          fi
          prev=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          range=${prev:+$prev..}$TAG
          {
            echo "## Changes"
            git log --no-merges --format='- %s (%h)' "$range"
            echo
            echo "**Image**: \`ghcr.io/$GITHUB_REPOSITORY:$TAG\` (linux/amd64, linux/arm64)"
            if [ -n "$prev" ]; then
              echo
              echo "**Full changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$prev...$TAG"
            fi
          } > /tmp/notes.md
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --notes-file /tmp/notes.md --verify-tag
